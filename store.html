<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Store - NFTme</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>
<body>

<header class="navbar">
  <div class="logo">
    <img src="images/Union.png">
  </div>

  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="about.html">About us</a>
    <a href="store.html">Store</a>
    <a href="#">Games</a>

    <button class="wallet-btn">Connect Wallet</button>
  </nav>
</header>

<!-- HERO -->
<section class="store-hero">
  <h1>Explore NFT Collection</h1>
  <p>Discover rare digital artworks from top creators</p>
</section>

<!-- FILTER BAR -->
<section class="store-filter">
  <button class="active">All</button>
  <button>Art</button>
  <button>3D</button>
  <button>Abstract</button>
  <button>Trending</button>
</section>

<!-- GRID -->
<section class="store-grid">

  <div class="nft-card">
    <img src="images/bitcoin artwork.jpg">
    <div class="nft-info">
      <h3>Abstract Flow</h3>
      <p>2.3 ETH</p>
    </div>
  </div>

  <div class="nft-card">
    <img src="images/community.jpg">
    <div class="nft-info">
      <h3>3D Sculpture</h3>
      <p>1.8 ETH</p>
    </div>
  </div>

  <div class="nft-card">
    <img src="images/polina.jpg">
    <div class="nft-info">
      <h3>Liquid Shape</h3>
      <p>2.1 ETH</p>
    </div>
  </div>

  <div class="nft-card">
    <img src="images/milad.jpg">
    <div class="nft-info">
      <h3>Neon Waves</h3>
      <p>2.7 ETH</p>
    </div>
  </div>

</section>

</body>
</html>
